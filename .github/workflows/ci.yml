name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -e '.[dev]'
      - run: pytest
      - name: Advisory retrieval evaluation
        run: python3 scripts/run_advisory_retrieval_eval.py
      - name: Build distributions
        run: |
          python -m pip install --upgrade build twine
          python -m build --outdir release-dist --sdist --wheel
          python -m twine check release-dist/*
      - name: Verify sdist contract tests
        run: python scripts/verify_sdist_contracts.py --dist-dir release-dist
