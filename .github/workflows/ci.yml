name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e '.[dev]'
      - run: ruff check .
      - run: pytest
        env:
          PCL_RELIABILITY_ARTIFACT_DIR: reliability-artifacts
      - name: Upload reliability audit summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reliability-${{ matrix.python-version }}
          path: reliability-artifacts/
          if-no-files-found: warn
      - name: Advisory retrieval evaluation
        run: python3 scripts/run_advisory_retrieval_eval.py
      - name: Smoke installed CLI
        run: |
          set -euo pipefail
          pcl --version
          tmp_dir="$(mktemp -d)"
          cd "$tmp_dir"
          pcl init
          pcl validate --strict --json
          pcl render --json
      - name: Build distributions
        if: matrix.python-version == '3.12'
        run: |
          python -m pip install --upgrade build twine
          python -m build --outdir release-dist --sdist --wheel
          python -m twine check release-dist/*
      - name: Verify sdist contract tests
        if: matrix.python-version == '3.12'
        run: python scripts/verify_sdist_contracts.py --dist-dir release-dist

  mcp-conformance:
    name: MCP conformance (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e '.[dev,mcp-test]'
      - run: python -m pytest tests/mcp -ra
