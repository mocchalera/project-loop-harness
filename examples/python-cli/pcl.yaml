project_loop:
  version: "0.1.0"
  schema_version: 2

project:
  name: "python-cli-example"
  type: "python-cli"
  root: "."

commands:
  install: "python -m pip install -e '.[dev]'"
  lint: "ruff check ."
  typecheck: ""
  test: "pytest"
  e2e: ""
  build: "python -m build"

discovery:
  include:
    - src/
    - tests/
    - docs/
    - pyproject.toml
  exclude:
    - .venv/
    - dist/
    - build/
    - coverage/
    - .pytest_cache/
    - .ruff_cache/

loop:
  max_iterations_per_workflow: 3
  max_fix_attempts_per_defect: 2
  max_parallel_jobs: 3
  require_human_after_repeated_failure: true
  stop_if_same_failure_repeats: true

permissions:
  agent_may_modify:
    - src/
    - tests/
    - docs/
    - README.md
    - pyproject.toml
  agent_may_not_modify:
    - .env
    - ".env.*"
    - .project-loop/project.db
    - .project-loop/events.jsonl
    - secrets/
    - dist/
    - build/
  require_human_approval:
    - database_migration
    - dependency_addition
    - auth_or_billing_change
    - production_config_change
    - destructive_operation

dashboard:
  output: ".project-loop/dashboard/dashboard.html"
  auto_render: true
