project_loop:
  version: "0.1.0"
  schema_version: 1

project:
  name: "project-loop-harness"
  type: "python-cli"
  root: "."

commands:
  install: "python -m pip install -e '.[dev]'"
  lint: "ruff check ."
  typecheck: ""
  test: "pytest"
  e2e: ""
  build: ""

discovery:
  include:
    - src/pcl/
    - tests/
    - docs/
    - agent-tasks/
    - skills/
    - plugins/
    - examples/
  exclude:
    - .venv/
    - .project-loop/
    - __pycache__/
    - .pytest_cache/
    - .ruff_cache/

loop:
  max_iterations_per_workflow: 3
  max_fix_attempts_per_defect: 2
  max_parallel_jobs: 3
  require_human_after_repeated_failure: true
  stop_if_same_failure_repeats: true

permissions:
  agent_may_modify:
    - src/pcl/
    - tests/
    - docs/
    - agent-tasks/
    - skills/
    - plugins/
    - examples/
    - pyproject.toml
    - Makefile
  agent_may_not_modify:
    - .env
    - .env.*
    - .project-loop/project.db
    - .project-loop/events.jsonl
    - secrets/
  require_human_approval:
    - database_migration
    - dependency_addition
    - auth_or_billing_change
    - production_config_change
    - destructive_operation

dashboard:
  output: ".project-loop/dashboard/dashboard.html"
  auto_render: true
